<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: system-ui; background: #f5f5f5; padding: 40px; display: flex; gap: 48px; flex-wrap: wrap; }
  .logo { text-align: center; }
  .logo h3 { margin: 12px 0 4px; color: #333; font-size: 14px; }
  .logo p { color: #888; font-size: 12px; margin: 0 0 8px; }
  .sizes { display: flex; gap: 16px; align-items: end; margin-top: 8px; }
  .sizes div { text-align: center; }
  .sizes span { display: block; font-size: 10px; color: #aaa; margin-top: 4px; }
  .dark { background: #1a1a1a; padding: 16px; border-radius: 12px; margin-top: 8px; display: flex; gap: 16px; justify-content: center; }
</style>
</head>
<body>
  <div class="logo">
    <h3>Geometric</h3>
    <p>Angular cuts, modern</p>
    <div class="sizes">
      <div><img src="/logo-pin-geo.svg" width="56" height="77"><span>56</span></div>
      <div><img src="/logo-pin-geo.svg" width="32" height="44"><span>32</span></div>
    </div>
    <div class="dark"><img src="/logo-pin-geo.svg" width="40" height="55"></div>
  </div>

  <div class="logo">
    <h3>Rounded</h3>
    <p>Friendly, soft caps</p>
    <div class="sizes">
      <div><img src="/logo-pin-round.svg" width="56" height="77"><span>56</span></div>
      <div><img src="/logo-pin-round.svg" width="32" height="44"><span>32</span></div>
    </div>
    <div class="dark"><img src="/logo-pin-round.svg" width="40" height="55"></div>
  </div>

  <div class="logo">
    <h3>Bold</h3>
    <p>Heavy, condensed</p>
    <div class="sizes">
      <div><img src="/logo-pin-bold.svg" width="56" height="77"><span>56</span></div>
      <div><img src="/logo-pin-bold.svg" width="32" height="44"><span>32</span></div>
    </div>
    <div class="dark"><img src="/logo-pin-bold.svg" width="40" height="55"></div>
  </div>

  <div class="logo">
    <h3>Stroke</h3>
    <p>Line-drawn, minimal</p>
    <div class="sizes">
      <div><img src="/logo-pin-stroke.svg" width="56" height="77"><span>56</span></div>
      <div><img src="/logo-pin-stroke.svg" width="32" height="44"><span>32</span></div>
    </div>
    <div class="dark"><img src="/logo-pin-stroke.svg" width="40" height="55"></div>
  </div>

  <div class="logo">
    <h3>Notched</h3>
    <p>Diagonal cut on crossbar</p>
    <div class="sizes">
      <div><img src="/logo-pin-notch.svg" width="56" height="77"><span>56</span></div>
      <div><img src="/logo-pin-notch.svg" width="32" height="44"><span>32</span></div>
    </div>
    <div class="dark"><img src="/logo-pin-notch.svg" width="40" height="55"></div>
  </div>
</body>
</html>
